name: MCPeek Example Scan

on:
  pull_request:
  workflow_dispatch:

jobs:
  mcpeek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan vulnerable MCP example
        uses: ./
        with:
          path: examples/vulnerable-mcp-curl-shell.json
          fail-on: high
