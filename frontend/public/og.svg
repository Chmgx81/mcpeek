<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Glow -->
  <circle cx="600" cy="280" r="300" fill="#22c55e" opacity="0.06"/>
  
  <!-- Eye icon -->
  <g transform="translate(540, 200)">
    <path d="M60 30 C60 30 30 0 0 30 C-30 60 -60 30 -60 30 C-60 30 -30 60 0 90 C30 120 60 90 60 90 C60 90 30 60 0 30" 
          fill="none" stroke="#22c55e" stroke-width="4" transform="translate(60, 0) scale(1.5)"/>
    <circle cx="60" cy="45" r="12" fill="#22c55e"/>
  </g>
  
  <!-- Lock icon -->
  <g transform="translate(650, 215) scale(0.8)">
    <rect x="0" y="20" width="40" height="30" rx="4" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M10 20 V15 C10 5 30 5 30 15 V20" fill="none" stroke="#22c55e" stroke-width="3"/>
    <circle cx="20" cy="35" r="3" fill="#22c55e"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#fafafa" letter-spacing="-2">MCPeek</text>
  
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#737373">Runtime-Aware Security Scanner for MCP Servers &amp; AI Agents</text>
  
  <!-- Accent line -->
  <rect x="540" y="445" width="120" height="2" rx="1" fill="url(#accent)"/>
  
  <!-- Bottom text -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#525252">Free &amp; Open Source  •  No Account Required</text>
</svg>
